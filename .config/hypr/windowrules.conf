windowrule {
    name = windowrule-7
    float = on
    center = on
    size = (monitor_w*0.3) (monitor_h*0.5)
    match:title = (Pulse Secure)
}


windowrule {
    name = windowrule-8
    float = on
    center = on
    size = (monitor_w*0.5) (monitor_h*0.6)
    match:title = (Waypaper)
}


windowrule {
    name = windowrule-8
    float = on
    center = on
    size = (monitor_w*0.125) (monitor_h*0.3)
    match:title = (Pomodorolm)
}
